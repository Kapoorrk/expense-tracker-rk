services:
  - type: web
    name: expense-tracker-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/expense-tracker-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: expense-tracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: expense-tracker-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: expense-tracker-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: expense-tracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: expense-tracker-db
          property: password

databases:
  - name: expense-tracker-db
    plan: free
    databaseName: expenses_db
