services:
  - type: web
    name: expense-tracker-backend
    runtime: docker
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: expense-tracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: expense-tracker-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: expense-tracker-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: expense-tracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: expense-tracker-db
          property: password
      - key: SERVER_PORT
        value: "8080"

databases:
  - name: expense-tracker-db
    plan: free
    databaseName: expenses_db
